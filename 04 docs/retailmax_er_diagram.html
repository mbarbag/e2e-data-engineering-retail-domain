
<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
#erd { padding: 1rem 0; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efe8',
    primaryBorderColor: dark ? '#5f5e5a' : '#b4b2a9',
  },
});
const diagram = `erDiagram
  MSTR_PROVEEDORES {
    string id_proveedor PK
    string razon_social
    string pais_origen
    int tiempo_repo_dias
    float calificacion_calidad
    bool activo
  }
  MSTR_ARTICULOS {
    string art_id PK
    string cod_barra
    string desc_art
    string id_categ_n1
    string id_categ_n2
    string id_categ_n3
    string id_proveedor FK
    float precio_lista
    float peso_kg
    string unid_medida
    bool activo
    date fec_alta
  }
  MSTR_TIENDAS {
    string id_tienda PK
    string nom_tienda
    string tipo_tienda
    string id_ciudad
    string id_pais
    int metros_cuadrados
    bool activo
    date fec_apertura
  }
  CRM_MIEMBROS {
    string id_miembro PK
    date fec_registro
    string id_ciudad
    string genero
    string rango_edad
    string canal_pref
    bool activo
    date fec_ultima_compra
  }
  TRANS_VENTAS {
    string id_trans PK
    string id_miembro FK
    string id_tienda FK
    string art_id FK
    date fec_trans
    string hra_trans
    int qty_vendida
    float precio_unitario_venta
    float descuento_aplicado
    string tipo_pago
    string canal_venta
  }
  INV_STOCK_DIARIO {
    string id_snapshot PK
    string art_id FK
    string id_tienda FK
    date fec_snapshot
    int stock_fisico
    int stock_transito
    int stock_reservado
    int stock_minimo_config
    int stock_maximo_config
  }
  POST_DEVOLUCIONES {
    string id_devolucion PK
    string id_trans_origen FK
    string art_id FK
    string id_tienda FK
    date fec_devolucion
    int qty_devuelta
    string motivo_cod
    string canal_devolucion
    string estado_devolucion
    float vr_reembolso
  }
  MSTR_PROVEEDORES ||--o{ MSTR_ARTICULOS : "suministra"
  MSTR_ARTICULOS ||--o{ TRANS_VENTAS : "se vende en"
  MSTR_ARTICULOS ||--o{ INV_STOCK_DIARIO : "tiene stock en"
  MSTR_ARTICULOS ||--o{ POST_DEVOLUCIONES : "es devuelto en"
  MSTR_TIENDAS ||--o{ TRANS_VENTAS : "registra"
  MSTR_TIENDAS ||--o{ INV_STOCK_DIARIO : "almacena"
  MSTR_TIENDAS ||--o{ POST_DEVOLUCIONES : "procesa"
  CRM_MIEMBROS |o--o{ TRANS_VENTAS : "realiza"
  TRANS_VENTAS ||--o{ POST_DEVOLUCIONES : "origina"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
