services:
  pgdatabase:
    image: postgres:16
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=myretail
    volumes:
      - "./data/retail_postgres_data:/var/lib/postgresql/data:rw"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d myretail"]
      interval: 5s
      timeout: 5s
      retries: 10

  ingest-service:
    build: .
    depends_on:
      pgdatabase:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://root:root@pgdatabase:5432/myretail
      OUTPUT_BASE: /data/output
    volumes:
      - "./output:/data/output:ro"
  